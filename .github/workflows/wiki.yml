name: Wiki

on:
  gollum:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Slack
        run: |
          payload="$(jq -n \
            --arg action "$ACTION" \
            --arg title "$TITLE" \
            --arg url "$URL" \
            --arg channel "#$SLACK_CHANNEL" \
            '{text: ("Wiki " + $action + ": " + $title + "\n" + $url), channel: $channel, username: "Wiki更新", icon_emoji: ":github-purple:"}')"
          curl --fail-with-body --show-error --silent -X POST -H 'Content-type: application/json' \
            --data "$payload" \
            "${{ secrets.SLACK_WEBHOOK_URL }}"
        env:
          ACTION: ${{ github.event.pages[0].action }}
          TITLE: ${{ github.event.pages[0].title }}
          URL: ${{ github.event.pages[0].html_url }}
          SLACK_CHANNEL: ${{ vars.SLACK_CHANNEL }}
